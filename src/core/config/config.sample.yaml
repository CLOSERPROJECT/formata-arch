workflow:
  name: 'Gallium shipment audit'
  steps:
    - id: '1'
      title: 'Shipment intake'
      order: 1
      organization: 'acme-corp'
      substeps:
        - id: '1.1'
          title: 'Record shipment weight (kg)'
          order: 1
          roles: ['chemist']
          inputKey: 'shipmentKg'
          inputType: 'formata'
          schema:
            type: 'object'
        - id: '1.2'
          title: 'Attach shipment reference'
          order: 2
          roles: ['chemist']
          inputKey: 'shipmentRef'
          inputType: 'formata'
          schema:
            type: 'object'
    - id: '2'
      title: 'Inspection'
      order: 2
      organization: 'globex-inc'
      substeps:
        - id: '2.1'
          title: 'Upload inspection report'
          order: 1
          roles: ['quality-control-inspector']
          inputKey: 'report'
          inputType: 'formata'
          schema:
            type: 'object'
        - id: '2.2'
          title: 'Record inspection outcome'
          order: 2
          roles: ['quality-control-inspector']
          inputKey: 'inspectionOutcome'
          inputType: 'formata'
          schema:
            type: 'object'
            required: ['outcome', 'inspector']
            properties:
              outcome:
                type: 'string'
                title: 'Outcome'
                enum: ['accepted', 'rejected', 'needs_review']
              inspector:
                type: 'string'
                title: 'Inspector'
              comments:
                type: 'string'
                title: 'Comments'
          uiSchema:
            comments:
              'ui:components':
                textWidget: 'textareaWidget'
    - id: '3'
      title: 'Approval'
      order: 3
      organization: 'initech'
      substeps:
        - id: '3.1'
          title: 'Approve shipment'
          order: 1
          roles: ['quality-control-supervisor']
          inputKey: 'approval'
          inputType: 'formata'
          schema:
            type: 'object'

organizations:
  - slug: 'acme-corp'
    name: 'Acme Corp'
    color: '#d7e9f2'
    border: '#6e99b2'
  - slug: 'globex-inc'
    name: 'Globex Inc'
    color: '#e0f1d9'
    border: '#7da36c'
  - slug: 'initech'
    name: 'Initech'
    color: '#f5e3c9'
    border: '#c2945a'

roles:
  - id: 'acme-corp/chemist'
    name: 'Chemist'
    slug: 'chemist'
    orgSlug: 'acme-corp'
    color: '#d7e9f2'
    border: '#6e99b2'
  - id: 'globex-inc/quality-control-inspector'
    name: 'Quality Control Inspector'
    slug: 'quality-control-inspector'
    orgSlug: 'globex-inc'
    color: '#e0f1d9'
    border: '#7da36c'
  - id: 'initech/quality-control-supervisor'
    name: 'Quality Control Supervisor'
    slug: 'quality-control-supervisor'
    orgSlug: 'initech'
    color: '#f5e3c9'
    border: '#c2945a'

dpp:
  enabled: true
  gtin: '09506000134352'
  lotInputKey: 'shipmentRef'
  lotDefault: ''
  serialInputKey: ''
  serialStrategy: 'process_id_hex'
  productName: 'Gallium shipment audit'
  productDescription: 'Shipment intake, inspection, and approval with traceable checkpoints.'
  ownerName: 'Attesta Demo Operator'
